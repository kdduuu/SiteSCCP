  <section>
  <div class="container mt-5 col-lg-5">
    <div id="form-message" class="alert d-none text-center" role="alert"></div>
    <form action="salvar_cadastro.php" method="POST" class="formulario p-4 bg-dark text-light rounded shadow">
      <h3 class="text-center mb-4 text-light">Crie sua conta</h3>

      <div class="mb-3">
        <label for="nome" class="form-label text-light">Nome</label>
        <input type="text" class="form-control bg-dark text-light border-white" id="nome" name="nome" required>
      </div>

      <div class="mb-3">
        <label for="cpf" class="form-label text-light">CPF</label>
        <input type="text" inputmode="numeric" maxlength="14" class="form-control bg-dark text-light border-white" id="cpf" name="cpf" required>
      </div>

      <div class="mb-3">
        <label for="email" class="form-label text-light">E-mail</label>
        <input type="email" class="form-control bg-dark text-light border-white" id="email" name="email" required>
      </div>

      <div class="mb-3">
        <label for="senha" class="form-label text-light">Senha</label>
        <input type="password" class="form-control bg-dark text-light border-white" id="senha" name="senha" required>
      </div>

      <div class="mb-3">
        <label for="confirme" class="form-label text-light">Confirme a senha</label>
        <input type="password" class="form-control bg-dark text-light border-white" id="confirme" name="confirme" required>
      </div>

      <div class="alert alert-light text-center mt-4" role="alert">
        Ao clicar em <strong>Criar Conta</strong> você concorda com os
        <strong>Termos de Adesão do Fiel Torcedor</strong> e agora sua alma nos pertence!
      </div>

      <div class="d-grid" >
        <button type="submit" class="btn btn-light fw-bold">CRIAR CONTA</button>
      </div>

      <p class="text-center mt-3 text-light">
        Já tem cadastro? <a href="sessao.html" class="text-white fw-semibold">Clique aqui para acessar</a>
      </p>
    </form>

    <script>
      document.addEventListener('DOMContentLoaded', function() {
        var cpfInput = document.getElementById('cpf');
        if (!cpfInput) return;

        cpfInput.addEventListener('input', function() {
          var value = cpfInput.value.replace(/\D/g, '');
          if (value.length > 11) {
            value = value.slice(0, 11);
          }
          value = value.replace(/(\d{3})(\d)/, '$1.$2');
          value = value.replace(/(\d{3})\.(\d{3})(\d)/, '$1.$2.$3');
          value = value.replace(/(\d{3})\.(\d{3})\.(\d{3})(\d)/, '$1.$2.$3-$4');
          cpfInput.value = value;
        });

        var messageContainer = document.getElementById('form-message');
        if (messageContainer) {
          var params = new URLSearchParams(window.location.search);
          var status = params.get('status');
          var msg = params.get('message');

          if (status === 'success') {
            messageContainer.className = 'alert alert-success text-center';
            messageContainer.textContent = 'Cadastro realizado com sucesso! Você já pode acessar com seu e-mail e senha.';
            messageContainer.classList.remove('d-none');
          } else if (status === 'error' && msg) {
            messageContainer.className = 'alert alert-danger text-center';
            messageContainer.textContent = decodeURIComponent(msg);
            messageContainer.classList.remove('d-none');
          }

          if (status) {
            window.history.replaceState({}, document.title, window.location.pathname);
          }
        }
      });
    </script>
