      <script>
        document.addEventListener('DOMContentLoaded', function() {
          var messageContainer = document.getElementById('login-message');
          if (!messageContainer) return;

          var params = new URLSearchParams(window.location.search);
          var status = params.get('status');
          var msg = params.get('message');

          if (status === 'success') {
            messageContainer.className = 'alert alert-success text-center';
            messageContainer.textContent = 'Login efetuado com sucesso!';
            messageContainer.classList.remove('d-none');
          } else if (status === 'error' && msg) {
            messageContainer.className = 'alert alert-danger text-center';
            messageContainer.textContent = decodeURIComponent(msg);
            messageContainer.classList.remove('d-none');
          }

          if (status) {
            window.history.replaceState({}, document.title, window.location.pathname);
          }
        });
      </script>
